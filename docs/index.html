<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MintBot — Alpha Engine</title>
    <meta name="description" content="NFT Alpha Engine — predictive intelligence, ranking, and actionable signals">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css?v=51">
    <style>
        /* ═══ Alpha Engine Dashboard ═══ */

        /* ── Regime Header ── */
        .alpha-header {
            background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 0;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .alpha-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .alpha-regime-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            font-family: var(--font-label);
            letter-spacing: 0.02em;
        }

        .alpha-regime-RISK_ON {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .alpha-regime-RISK_OFF {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alpha-regime-ROTATION {
            background: rgba(96, 165, 250, 0.12);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .alpha-regime-CHOP {
            background: rgba(156, 163, 175, 0.12);
            color: #9ca3af;
            border: 1px solid rgba(156, 163, 175, 0.2);
        }

        .alpha-regime-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .alpha-regime-RISK_ON .alpha-regime-dot {
            background: #22c55e;
        }

        .alpha-regime-RISK_OFF .alpha-regime-dot {
            background: #ef4444;
        }

        .alpha-regime-ROTATION .alpha-regime-dot {
            background: #60a5fa;
        }

        .alpha-regime-CHOP .alpha-regime-dot {
            background: #9ca3af;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Pipeline Progress Bar ── */
        .pipeline-progress {
            background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 16px 20px;
            margin-bottom: 16px;
            transition: all 400ms ease;
            overflow: hidden;
        }

        .pipeline-progress.hidden {
            display: none;
        }

        .pipeline-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .pipeline-progress-step {
            font-size: 12px;
            font-weight: 600;
            color: var(--blue-pri);
            font-family: var(--font-label);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pipeline-progress-step::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--blue-pri);
            animation: pulse 1.2s infinite;
        }

        .pipeline-progress-meta {
            font-size: 11px;
            color: var(--t4);
            font-family: var(--font-mono);
            display: flex;
            gap: 14px;
        }

        .pipeline-progress-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(128, 174, 255, 0.1);
            overflow: hidden;
            position: relative;
        }

        .pipeline-progress-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
            transition: width 500ms ease;
            width: 0%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .pipeline-progress-detail {
            font-size: 11px;
            color: var(--t3);
            margin-top: 8px;
            font-family: var(--font-label);
        }

        .alpha-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 11px;
            color: var(--t3);
        }

        .alpha-refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(128, 174, 255, 0.15);
            background: rgba(128, 174, 255, 0.08);
            color: var(--blue-pri);
            transition: all 200ms;
            font-family: var(--font-label);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .alpha-refresh-btn:hover {
            background: rgba(128, 174, 255, 0.15);
            transform: translateY(-1px);
        }

        .alpha-refresh-btn.loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .alpha-refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Highlights Row ── */
        .alpha-highlights {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1px;
            background: var(--border);
        }

        .alpha-hl-item {
            padding: 14px 18px;
            background: var(--bg-2);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .alpha-hl-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--t4);
            font-family: var(--font-label);
        }

        .alpha-hl-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--t1);
            font-family: var(--font-label);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alpha-hl-score {
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font-mono);
        }

        /* ── Tabs ── */
        .alpha-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--bg-2);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        .alpha-tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-label);
            font-size: 11px;
            font-weight: 600;
            color: var(--t3);
            transition: all 250ms;
            border: 1px solid transparent;
            background: transparent;
            white-space: nowrap;
        }

        .alpha-tab:hover {
            color: var(--t2);
            background: rgba(255, 255, 255, 0.03);
        }

        .alpha-tab.active {
            color: var(--t1);
        }

        .alpha-tab-alpha.active {
            background: rgba(34, 197, 94, 0.08);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.2);
        }

        .alpha-tab-minting.active {
            background: rgba(105, 246, 184, 0.08);
            color: var(--green);
            border-color: rgba(105, 246, 184, 0.2);
        }

        .alpha-tab-watch.active {
            background: rgba(245, 158, 11, 0.08);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.2);
        }

        .alpha-tab-avoid.active {
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .alpha-tab-bluechip.active {
            background: rgba(167, 139, 250, 0.08);
            color: #a78bfa;
            border-color: rgba(167, 139, 250, 0.2);
        }

        .alpha-tab-upcoming.active {
            background: rgba(96, 165, 250, 0.08);
            color: #60a5fa;
            border-color: rgba(96, 165, 250, 0.2);
        }

        .alpha-tab-count {
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.06);
        }

        .alpha-pane {
            display: none;
        }

        .alpha-pane.active {
            display: block;
        }

        /* ── Alpha Card Grid ── */
        .alpha-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 16px;
        }

        @media (max-width: 860px) {
            .alpha-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── Alpha Card ── */
        .alpha-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
            transition: all 250ms;
            position: relative;
        }

        .alpha-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Action stripe top */
        .alpha-card-stripe {
            height: 3px;
            width: 100%;
        }

        /* Card header */
        .alpha-card-head {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px 12px;
        }

        .alpha-card-img {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--border);
            background: var(--bg-3);
            flex-shrink: 0;
        }

        .alpha-card-img-ph {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--bg-3), var(--bg-elevated));
            border: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .alpha-card-info {
            flex: 1;
            min-width: 0;
        }

        .alpha-card-name {
            font-family: var(--font-label);
            font-size: 14px;
            font-weight: 700;
            color: var(--t1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alpha-card-sub {
            font-size: 10px;
            color: var(--t3);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .alpha-card-verified {
            color: #60a5fa;
        }

        .alpha-chain-badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.06em;
            font-family: var(--font-label);
        }

        .alpha-chain-ETH {
            background: rgba(98, 126, 234, 0.12);
            color: #7b93eb;
        }

        .alpha-chain-BASE {
            background: rgba(0, 82, 255, 0.12);
            color: #5b8fff;
        }

        .alpha-chain-APE {
            background: rgba(0, 82, 255, 0.12);
            color: #80aeff;
        }

        /* Action badge */
        .alpha-card-action {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.04em;
            font-family: var(--font-label);
            text-transform: uppercase;
            flex-shrink: 0;
        }

        /* Score + Grade row */
        .alpha-score-section {
            padding: 0 18px 14px;
        }

        .alpha-score-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .alpha-score-num {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 800;
            color: var(--t1);
            line-height: 1;
        }

        .alpha-grade {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            font-family: var(--font-label);
        }

        .alpha-grade-A {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .alpha-grade-B {
            background: rgba(96, 165, 250, 0.15);
            color: #60a5fa;
        }

        .alpha-grade-C {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .alpha-grade-D {
            background: rgba(156, 163, 175, 0.15);
            color: #9ca3af;
        }

        .alpha-grade-AVOID {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .alpha-signal-type {
            font-size: 11px;
            color: var(--t3);
            font-weight: 500;
            margin-left: auto;
        }

        /* Score bar */
        .alpha-score-bar-wrap {
            height: 6px;
            background: var(--bg-0);
            border-radius: 3px;
            overflow: hidden;
        }

        .alpha-score-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 600ms ease;
        }

        /* Layer breakdown */
        .alpha-layers {
            padding: 0 18px;
            margin-bottom: 14px;
        }

        .alpha-layer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 10px;
        }

        .alpha-layer-name {
            width: 72px;
            font-weight: 600;
            color: var(--t3);
            font-family: var(--font-label);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        .alpha-layer-bar-wrap {
            flex: 1;
            height: 4px;
            background: var(--bg-0);
            border-radius: 2px;
            overflow: hidden;
        }

        .alpha-layer-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 400ms ease;
        }

        .alpha-layer-val {
            width: 28px;
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--t3);
            text-align: right;
            font-size: 10px;
        }

        /* Why Now / Evidence */
        .alpha-evidence {
            padding: 12px 18px;
            margin: 0 18px 14px;
            background: var(--bg-3);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .alpha-evidence-title {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--t4);
            margin-bottom: 6px;
            font-family: var(--font-label);
        }

        .alpha-evidence-item {
            font-size: 11px;
            color: var(--t2);
            line-height: 1.5;
            padding: 2px 0 2px 12px;
            position: relative;
        }

        .alpha-evidence-item::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--t4);
        }

        /* Timing + Confidence row */
        .alpha-timing-row {
            display: flex;
            gap: 12px;
            padding: 0 18px 12px;
            font-size: 10px;
        }

        .alpha-timing-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .alpha-timing-label {
            font-weight: 600;
            color: var(--t4);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: var(--font-label);
        }

        .alpha-timing-val {
            font-weight: 600;
            color: var(--t2);
            font-family: var(--font-mono);
        }

        /* Entry / Exit zone */
        .alpha-zones {
            padding: 12px 18px;
            margin: 0 18px 14px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.04), rgba(96, 165, 250, 0.04));
            border-radius: 8px;
            border: 1px solid rgba(128, 174, 255, 0.08);
            font-size: 10px;
        }

        .alpha-zone-row {
            display: flex;
            gap: 8px;
            padding: 3px 0;
        }

        .alpha-zone-label {
            width: 80px;
            font-weight: 700;
            color: var(--t4);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-family: var(--font-label);
            flex-shrink: 0;
        }

        .alpha-zone-val {
            color: var(--t2);
            flex: 1;
        }

        .alpha-zone-entry .alpha-zone-label {
            color: #22c55e;
        }

        .alpha-zone-exit .alpha-zone-label {
            color: #f59e0b;
        }

        .alpha-zone-invalid .alpha-zone-label {
            color: #ef4444;
        }

        /* Footer stats + links */
        .alpha-card-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--t4);
            flex-wrap: wrap;
        }

        .alpha-foot-stat {
            font-family: var(--font-mono);
        }

        .alpha-foot-stat span {
            color: var(--t2);
            font-weight: 600;
        }

        .alpha-foot-links {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .alpha-foot-link {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            color: var(--t3);
            background: rgba(255, 255, 255, 0.04);
            text-decoration: none;
            transition: all 200ms;
            font-family: var(--font-label);
        }

        .alpha-foot-link:hover {
            color: var(--t1);
            background: rgba(255, 255, 255, 0.08);
        }

        .alpha-card-freshness {
            font-size: 9px;
            color: var(--t4);
            padding: 4px 18px 10px;
            font-family: var(--font-mono);
        }

        /* ── Loading / Empty states ── */
        .alpha-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--t3);
            font-size: 14px;
        }

        .alpha-empty-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .alpha-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 80px 20px;
            color: var(--t3);
        }

        .alpha-spinner {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--blue-pri);
            animation: spin 0.8s linear infinite;
        }

        /* Summary bar */
        .alpha-summary-bar {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 18px;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--t2);
            line-height: 1.6;
        }

        .alpha-summary-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--blue-pri);
            font-family: var(--font-label);
            margin-bottom: 4px;
        }

        /* Legacy card support */
        .ins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 14px;
        }

        .ins-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 18px;
            transition: all 250ms;
            position: relative;
            overflow: hidden;
        }

        .ins-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .ins-card-minting {
            border-left: 3px solid var(--green);
        }

        .ins-card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .ins-card-img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--border);
            background: var(--bg-3);
            flex-shrink: 0;
        }

        .ins-card-info {
            flex: 1;
            min-width: 0;
        }

        .ins-card-name {
            font-family: var(--font-label);
            font-size: 14px;
            font-weight: 700;
            color: var(--t1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ins-card-chain {
            font-size: 10px;
            color: var(--t3);
            margin-top: 2px;
            font-family: var(--font-label);
        }
    </style>
</head>

<body>
    <!-- Page container — uses the existing app layout from index.css -->
    <div class="page-container" style="max-width: 1200px; margin: 0 auto; padding: 24px;">

        <!-- Loading state -->
        <div id="alpha-loading" class="alpha-loading">
            <div class="alpha-spinner"></div>
            <div>Loading Alpha Engine...</div>
        </div>

        <!-- Main content (hidden until loaded) -->
        <div id="alpha-content" style="display: none;">

            <!-- Regime Header -->
            <div class="alpha-header" id="alpha-header">
                <div class="alpha-header-top">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div
                            style="font-family: var(--font-label); font-size: 18px; font-weight: 800; color: var(--t1); letter-spacing: -0.02em;">
                            Alpha <span style="color: var(--blue-pri);">Engine</span>
                        </div>
                        <div id="regime-tag" class="alpha-regime-tag alpha-regime-CHOP">
                            <span class="alpha-regime-dot"></span>
                            <span id="regime-label">Loading...</span>
                        </div>
                    </div>
                    <div class="alpha-meta">
                        <span id="alpha-updated"></span>
                        <button class="alpha-refresh-btn" id="refresh-btn" onclick="refreshAlpha()">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"
                                style="width:12px;height:12px;">
                                <path d="M1 8a7 7 0 0 1 13.07-3.38M15 8A7 7 0 0 1 1.93 11.38" />
                                <path d="M14 1v4h-4M2 15v-4h4" />
                            </svg>
                            REFRESH
                        </button>

        /* ── Data Fetching ── */
        async function fetchAlpha() {
            try {
                const r = await fetch(API_BASE + '/api/insights');
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                if (data.status === 'ok' || data.alpha_cards) {
                    renderDashboard(data);
                } else if (data.status === 'loading') {
                    setTimeout(fetchAlpha, 3000);
                }
            } catch (e) {
                console.error('Fetch failed:', e);
                setTimeout(fetchAlpha, 5000);
            }
        }

            if (progressPollId) return;
            progressPollId = setInterval(async () => {
                try {
                    const r = await fetch(API_BASE + '/api/insights/progress');
                    const p = await r.json();
                    if (p.running) {
                        document.getElementById('progress-step').textContent = p.step || 'Working';
                        document.getElementById('progress-pct').textContent = p.pct + '%';
                        document.getElementById('progress-elapsed').textContent = p.elapsed + 's';
                        document.getElementById('progress-fill').style.width = p.pct + '%';
                        document.getElementById('progress-detail').textContent = p.detail || '';
                    } else if (p.pct >= 100) {
                        stopProgressPolling();
                    }
                } catch (e) { }
            }, 1500);
        }

        function stopProgressPolling() {
            if (progressPollId) {
                clearInterval(progressPollId);
                progressPollId = null;
            }
            const el = document.getElementById('pipeline-progress');
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('progress-step').textContent = 'Complete';
            document.getElementById('progress-detail').textContent = '';
            setTimeout(() => el.classList.add('hidden'), 1200);
        }

        async function refreshAlpha() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            startProgressPolling();
            try {
                const r = await fetch(API_BASE + '/api/insights/refresh');
                const data = await r.json();
                if (data.status === 'ok' || data.alpha_cards) {
                    renderDashboard(data);
                }
            } catch (e) {
                console.error('Refresh failed:', e);
            } finally {
                btn.classList.remove('loading');
                stopProgressPolling();
            }
        }

        // Auto-refresh every 5 minutes
        setInterval(fetchAlpha, 300000);

        // Initial load — start progress polling
        startProgressPolling();
        fetchAlpha().then(() => { stopProgressPolling(); isInitialLoad = false; });
    </script>
</body>

</html>
